name: EasyTier Release Docker Image
#  `DOCKERHUB_USERNAME`: DockerHub 用户名
#  `DOCKERHUB_TOKEN`: DockerHub Access Token

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      custom_docker_tag:
        description: '自定义镜像版本标签（可选，不填则默认为 "latest"）'
        required: false
        default: ''

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      build: ${{ steps.check_version.outputs.build }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases/latest | jq -r .tag_name)
          echo "Latest version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing build."
            echo "build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f .github/state/LAST_VERSION ]; then
            CURRENT_VERSION=$(cat .github/state/LAST_VERSION)
          else
            CURRENT_VERSION=""
          fi
          
          LATEST_VERSION="${{ steps.get_version.outputs.version }}"
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_VERSION"
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "Version $LATEST_VERSION is already built."
            echo "build=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [mixed, core, web]
        include:
          - variant: mixed
            dockerfile: docker/Dockerfile
            state_file: .github/state/LAST_VERSION
            tag_latest: latest
            tag_version_suffix: ""
          - variant: core
            dockerfile: docker/Dockerfile.core
            state_file: .github/state/LAST_VERSION_CORE
            tag_latest: core-latest
            tag_version_suffix: "-core"
          - variant: web
            dockerfile: docker/Dockerfile.web
            state_file: .github/state/LAST_VERSION_WEB
            tag_latest: web-latest
            tag_version_suffix: "-web"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VERSION=${{ needs.check-version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ matrix.tag_latest }}
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ needs.check-version.outputs.version }}${{ matrix.tag_version_suffix }}

      - name: Update state file (${{ matrix.variant }})
        run: |
          mkdir -p $(dirname ${{ matrix.state_file }})
          echo "${{ needs.check-version.outputs.version }}" > ${{ matrix.state_file }}
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ${{ matrix.state_file }}
          git diff --staged --quiet || (git commit -m "Update ${{ matrix.variant }} version to ${{ needs.check-version.outputs.version }}" && git pull --rebase && git push)
