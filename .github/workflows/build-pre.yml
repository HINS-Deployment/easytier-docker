name: EasyTier Pre-release Docker Image
#  `DOCKERHUB_USERNAME`: DockerHub 用户名
#  `DOCKERHUB_TOKEN`: DockerHub Access Token

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      custom_docker_tag:
        description: '自定义镜像版本标签（可选，不填则默认为 "pre"）'
        required: false
        default: ''

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      build: ${{ steps.check_version.outputs.build }}
      version_tag: ${{ steps.get_version.outputs.version_tag }}
      version_number: ${{ steps.get_version.outputs.version_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release version
        id: get_version
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases | jq -r '.[] | select(.prerelease==true) | .tag_name' | head -n 1)
          echo "Latest tag: $LATEST_TAG"
          echo "version_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version_number=${LATEST_TAG#v}" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing build."
            echo "build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f .github/state/LAST_PRE_VERSION ]; then
            CURRENT_VERSION=$(cat .github/state/LAST_PRE_VERSION)
          else
            CURRENT_VERSION=""
          fi
          
          LATEST_VERSION="${{ steps.get_version.outputs.version_tag }}"
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_VERSION"
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "Version $LATEST_VERSION is already built."
            echo "build=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [mixed, core, web]
        include:
          - variant: mixed
            dockerfile: docker/Dockerfile
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ github.event.inputs.custom_docker_tag || 'pre' }}
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ needs.check-version.outputs.version_number }}
            state_file: .github/state/LAST_PRE_VERSION
          - variant: core
            dockerfile: docker/Dockerfile.core
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:core-pre
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ needs.check-version.outputs.version_number }}-core
            state_file: .github/state/LAST_PRE_VERSION_CORE
          - variant: web
            dockerfile: docker/Dockerfile.web
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:web-pre
              ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ needs.check-version.outputs.version_number }}-web
            state_file: .github/state/LAST_PRE_VERSION_WEB

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VERSION=${{ needs.check-version.outputs.version_tag }}
          tags: ${{ matrix.tags }}

      - name: Update state file (${{ matrix.variant }})
        run: |
          mkdir -p $(dirname ${{ matrix.state_file }})
          echo "${{ needs.check-version.outputs.version_tag }}" > ${{ matrix.state_file }}
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ${{ matrix.state_file }}
          git diff --staged --quiet || (git commit -m "Update ${{ matrix.variant }} pre-version to ${{ needs.check-version.outputs.version_tag }}" && git pull --rebase && git push)
